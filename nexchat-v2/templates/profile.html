<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Profile – NexChat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="orb-wrap"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<nav class="topbar">
  <div class="topbar-brand"><div class="brand-icon sm"><i class="fa-solid fa-comments"></i></div><span class="brand-name">NexChat</span></div>
  <div class="topbar-nav">
    <a href="/index"   class="tnav"><i class="fa-solid fa-message"></i><span>Chats</span></a>
    <a href="/profile" class="tnav active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    <a href="/logout"  class="tnav logout"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
  </div>
  <div class="topbar-user">
    <div class="uav">{{ username[0].upper() }}</div>
    <span>{{ username }}</span>
  </div>
</nav>
<div class="auth-wrap" style="margin-top:80px">
  <div class="auth-card" style="max-width:520px">
    <h2 class="profile-title"><i class="fa-solid fa-user-pen me-2"></i>Edit Profile</h2>
    {% if error %}<div class="alert-err"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
    {% if success %}<div class="alert-ok"><i class="fa-solid fa-circle-check"></i> {{ success }}</div>{% endif %}
    <form method="POST" enctype="multipart/form-data">
      <div class="av-up mb-4" style="flex-direction:row;gap:20px;align-items:center">
        <div class="av-preview" id="avPrev" style="width:80px;height:80px;border-radius:50%">
          {% if user.avatar %}<img src="/static/uploads/{{ user.avatar }}" id="avImg"/>{% else %}<i class="fa-solid fa-user fa-2x"></i>{% endif %}
        </div>
        <div>
          <label class="av-label" for="avFile"><i class="fa-solid fa-camera"></i> Change Photo</label>
          <input type="file" id="avFile" name="profile_picture" accept="image/*" class="d-none" onchange="prevAv(event)"/>
          <div style="color:var(--tm);font-size:13px;margin-top:6px">@{{ username }}</div>
        </div>
      </div>
      <div class="fg"><label>Bio</label>
        <div class="ii"><i class="fa-solid fa-quote-left"></i><input type="text" name="bio" placeholder="Something about you…" value="{{ user.bio or '' }}"/></div>
      </div>
      <div class="fg"><label>Location</label>
        <div class="ii"><i class="fa-solid fa-location-dot"></i><input type="text" name="location" placeholder="Where are you?" value="{{ user.location or '' }}"/></div>
      </div>
      <div class="divider-line my-3"><span>Change Password</span></div>
      <div class="fg"><label>New Password <small style="color:var(--tm)">(blank to keep)</small></label>
        <div class="ii"><i class="fa-solid fa-lock"></i>
          <input type="password" name="new_password" id="np" placeholder="Min. 6 characters"/>
          <button type="button" class="eye-btn" onclick="tog('np',this)"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="d-flex gap-3 mt-4">
        <button type="submit" class="btn-glow flex-fill"><i class="fa-solid fa-floppy-disk me-2"></i>Save</button>
        <a href="/index" class="btn-outline flex-fill text-center"><i class="fa-solid fa-arrow-left me-2"></i>Back</a>
      </div>
    </form>
  </div>
</div>
<script>
function prevAv(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('avPrev').innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`};r.readAsDataURL(f);}
function tog(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.querySelector('i').className=i.type==='text'?'fa-solid fa-eye-slash':'fa-solid fa-eye';}
</script>
</body></html>
