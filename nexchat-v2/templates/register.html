<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register – NexChat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="orb-wrap"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand mb-4">
      <div class="brand-icon"><i class="fa-solid fa-comments"></i></div>
      <h1>Create Account</h1><p>Join NexChat today</p>
    </div>
    {% if error %}<div class="alert-err"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
    <form method="POST" enctype="multipart/form-data">
      <div class="av-up mb-4">
        <div class="av-preview" id="avPrev"><i class="fa-solid fa-user fa-2x"></i></div>
        <label class="av-label" for="avFile"><i class="fa-solid fa-camera"></i> Upload Photo</label>
        <input type="file" id="avFile" name="profile_picture" accept="image/*" class="d-none" onchange="prevAv(event)"/>
      </div>
      <div class="fg"><label>Username</label>
        <div class="ii"><i class="fa-solid fa-user"></i><input type="text" name="username" placeholder="Min. 3 characters" required minlength="3"/></div>
      </div>
      <div class="fg"><label>Password</label>
        <div class="ii"><i class="fa-solid fa-lock"></i>
          <input type="password" name="password" id="p1" placeholder="Min. 6 characters" required minlength="6"/>
          <button type="button" class="eye-btn" onclick="tog('p1',this)"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="fg"><label>Confirm Password</label>
        <div class="ii"><i class="fa-solid fa-shield-halved"></i>
          <input type="password" name="confirm_password" id="p2" placeholder="Repeat password" required minlength="6"/>
        </div>
      </div>
      <button type="submit" class="btn-glow w-100 mt-2"><i class="fa-solid fa-rocket me-2"></i>Create Account</button>
    </form>
    <p class="auth-foot">Already have one? <a href="/login">Sign in</a></p>
  </div>
</div>
<script>
function prevAv(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('avPrev').innerHTML=`<img src="${ev.target.result}"/>`};r.readAsDataURL(f);}
function tog(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.querySelector('i').className=i.type==='text'?'fa-solid fa-eye-slash':'fa-solid fa-eye';}
document.querySelector('form').addEventListener('submit',function(e){if(document.getElementById('p1').value!==document.getElementById('p2').value){e.preventDefault();alert('Passwords do not match.');}});
</script>
</body></html>
