<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login – NexChat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="orb-wrap"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand mb-4">
      <div class="brand-icon"><i class="fa-solid fa-comments"></i></div>
      <h1>NexChat</h1><p>Connect. Message. Thrive.</p>
    </div>
    {% if error %}<div class="alert-err"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
    <form method="POST">
      <div class="fg"><label>Username</label>
        <div class="ii"><i class="fa-solid fa-user"></i>
          <input type="text" name="username" placeholder="Your username" required autofocus/>
        </div>
      </div>
      <div class="fg"><label>Password</label>
        <div class="ii"><i class="fa-solid fa-lock"></i>
          <input type="password" name="password" id="pwd" placeholder="Your password" required/>
          <button type="button" class="eye-btn" onclick="tog('pwd',this)"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn-glow w-100 mt-2"><i class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
    </form>
    <p class="auth-foot">No account? <a href="/register">Create one</a></p>
  </div>
</div>
<script>
function tog(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.querySelector('i').className=i.type==='text'?'fa-solid fa-eye-slash':'fa-solid fa-eye';}
</script>
</body></html>
